name: Preview – feature/einkaufsliste

# Deployt den Feature-Branch unter:
# https://algether-spec.github.io/einkaufsliste/preview/feature-einkaufsliste/

on:
  push:
    branches: [feature/einkaufsliste]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-preview-einkaufsliste
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deployment-Ordner vorbereiten
        run: |
          mkdir _deploy
          rsync -a \
            --exclude='.git' \
            --exclude='_deploy' \
            --exclude='.github' \
            --exclude='node_modules' \
            . _deploy/
          sed -i "s|supabaseUrl: \"[^\"]*\"|supabaseUrl: \"${{ secrets.SUPABASE_URL }}\"|" _deploy/config.js
          sed -i "s|supabaseAnonKey: \"[^\"]*\"|supabaseAnonKey: \"${{ secrets.SUPABASE_ANON_KEY }}\"|" _deploy/config.js

      - name: Preview auf gh-pages Branch deployen
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _deploy
          target-folder: preview/feature-einkaufsliste
          clean: true
          commit-message: "preview: feature/einkaufsliste @ ${{ github.sha }}"

      - name: Preview-URL anzeigen
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}"  | cut -d'/' -f2)
          echo "Preview URL: https://${OWNER}.github.io/${REPO}/preview/feature-einkaufsliste/"
