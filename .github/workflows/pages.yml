name: Deploy to GitHub Pages

# Deployt main unter: https://algether-spec.github.io/einkaufsliste/
#
# Nutzt JamesIves/github-pages-deploy-action statt actions/deploy-pages,
# damit das preview/-Verzeichnis (Feature-Branch-Deployments) erhalten bleibt.
#
# GitHub Pages Quelle (einmalig setzen):
#   Settings → Pages → Source: "Deploy from a branch" → Branch: gh-pages / root

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deployment-Ordner vorbereiten
        run: |
          mkdir _deploy
          rsync -a \
            --exclude='.git' \
            --exclude='_deploy' \
            --exclude='.github' \
            --exclude='node_modules' \
            . _deploy/
          sed -i "s|supabaseUrl: \"[^\"]*\"|supabaseUrl: \"${{ secrets.SUPABASE_URL }}\"|" _deploy/config.js
          sed -i "s|supabaseAnonKey: \"[^\"]*\"|supabaseAnonKey: \"${{ secrets.SUPABASE_ANON_KEY }}\"|" _deploy/config.js

      - name: Auf gh-pages Branch deployen
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _deploy
          single-commit: true
          clean: true
          clean-exclude: |
            preview/
          commit-message: "deploy: main @ ${{ github.sha }}"
